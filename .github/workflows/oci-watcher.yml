name: OCI A1 Capacity Watcher

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  watch-and-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
    - name: Install OCI CLI
      run: |
        pip install oci-cli --quiet
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Configure OCI CLI
      env:
        OCI_USER: ${{ secrets.OCI_USER_OCID }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
        OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.oci
        echo "$OCI_KEY" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        printf "[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=ap-singapore-1\nkey_file=/home/runner/.oci/oci_api_key.pem\n" \
          "$OCI_USER" "$OCI_FINGERPRINT" "$OCI_TENANCY" > ~/.oci/config
        chmod 600 ~/.oci/config

    - name: Test OCI Connection
      run: oci iam region list

    - name: Check A1.Flex Availability
      id: check
      run: |
        SHAPE_COUNT=$(oci compute shape list \
          --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
          --availability-domain "ybaB:AP-SINGAPORE-1-AD-1" \
          --query "length(data[?name=='VM.Standard.A1.Flex'])" \
          --raw-output 2>/dev/null || echo "0")
        echo "Shape count: $SHAPE_COUNT"
        echo "available=$SHAPE_COUNT" >> $GITHUB_OUTPUT
        if [ "$SHAPE_COUNT" -gt "0" ]; then
          echo "CAPACITY AVAILABLE!"
        else
          echo "No capacity yet. Will retry in 10 minutes."
        fi

    - name: Trigger ORM Apply Job
      id: apply
      if: steps.check.outputs.available > 0
      run: |
        JOB_RESPONSE=$(oci resource-manager job create-apply-job \
          --stack-id "${{ secrets.OCI_STACK_ID }}" \
          --execution-plan-strategy AUTO_APPROVED \
          --output json)
        JOB_ID=$(echo "$JOB_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
        echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
        for i in {1..16}; do
          sleep 30
          STATUS=$(oci resource-manager job get \
            --job-id "$JOB_ID" \
            --query "data.\"lifecycle-state\"" \
            --raw-output)
          echo "[$i/16] Job status: $STATUS"
          if [ "$STATUS" = "SUCCEEDED" ]; then
            echo "job_status=SUCCEEDED" >> $GITHUB_OUTPUT
            break
          elif [ "$STATUS" = "FAILED" ]; then
            echo "job_status=FAILED" >> $GITHUB_OUTPUT
            break
          fi
        done

    - name: Notify Telegram SUCCESS
      if: steps.apply.outputs.job_status == 'SUCCEEDED'
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="OCI VM CREATED! Shape: VM.Standard.A1.Flex | Region: ap-singapore-1 | Check OCI Console for IP!"

    - name: Notify Telegram FAILED
      if: steps.apply.outputs.job_status == 'FAILED'
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="OCI Apply Job FAILED. Capacity found but job failed. Check OCI Console."
